<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div
        class="relative flex h-auto min-h-screen w-full flex-col max-w-[430px] mx-auto overflow-x-hidden shadow-2xl bg-white dark:bg-slate-900">
        <!-- Illustration/Brand Section -->
        <div class="@container">
            <div class="@[480px]:px-4 @[480px]:py-3">
                <div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-primary/10 @[480px]:rounded-lg min-h-[240px]"
                    data-alt="Modern abstract e-commerce shopping illustration with bags"
                    style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAdBpSR_LHCW1ViJ2PcnolUUlB0pTVKkUtW9PLhQlEmYMjjeRELLDXnSkEdNIHXQmaRAvVM8Ix4r0ik5LI6JZ_Kr3OVNaZscLxtkq0VuDEUGEW4DyICt7Ddktwtb3PVuDV5N34WMbfEFWij9kFveb8MT62R1B-FIQzVCeONfcijQWr5u4do9wMRUMHp7XUuU1H5hNYB92m0jmGEobeWBcK_OA-i3208nrUTEvk9xcIBpbJikUeu1lkSCGP-wBSTFucKaCY1KMJCn78");'>
                </div>
            </div>
        </div>
        <!-- Welcome Text -->
        <div class="px-6 pt-8 pb-4">
            <h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-bold leading-tight">Welcome Back
            </h1>
            <p class="text-slate-500 dark:text-slate-400 mt-2">Login to your account to continue shopping</p>
        </div>
        <!-- Login Form -->
        <div class="flex flex-col gap-4 px-6 py-2">
            <!-- Email Field -->
            <label class="flex flex-col w-full">
                <p class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal pb-2">Email or
                    Username</p>
                <input
                    class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 placeholder:text-slate-400 p-4 text-base font-normal"
                    id="usernameInput" placeholder="Nhap username" type="text" value="" />
            </label>
            <!-- Password Field -->
            <label class="flex flex-col w-full">
                <div class="flex justify-between items-center pb-2">
                    <p class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal">Password</p>
                    <a class="text-primary text-sm font-semibold hover:underline" href="#">Forgot?</a>
                </div>
                <div
                    class="flex w-full items-stretch rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20">
                    <input
                        class="form-input flex w-full border-none bg-transparent h-14 placeholder:text-slate-400 p-4 rounded-l-xl text-base font-normal focus:ring-0"
                        id="passwordInput" placeholder="Nhap mat khau" type="password" value="" />
                    <div class="text-slate-400 flex items-center justify-center px-4 cursor-pointer">
                        <span class="material-symbols-outlined">visibility</span>
                    </div>
                </div>
            </label>
            <p class="text-xs text-slate-500">Tai khoan mau: admin/1 va user/2</p>
            <p class="hidden text-sm text-red-500" id="loginError">Sai tai khoan hoac mat khau.</p>
        </div>
        <!-- Action Button -->
        <div class="px-6 py-6">
            <button id="loginButton"
                class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/30 active:scale-[0.98]">
                Log In
            </button>
        </div>
        <!-- Footer Link -->
        <div class="pt-2 pb-4 text-center">
            <p class="text-slate-500 dark:text-slate-400">
                Don't have an account?
                <a class="text-primary font-bold hover:underline" href="#">Sign Up</a>
            </p>
        </div>
    </div>
    <script>
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const loginButton = document.getElementById('loginButton');
        const loginError = document.getElementById('loginError');

        const sendLoginRequest = (payload) => {
            const message = JSON.stringify(payload);
            if (window.LoginChannel && typeof window.LoginChannel.postMessage === 'function') {
                window.LoginChannel.postMessage(message);
            }
            if (window.chrome && window.chrome.webview && typeof window.chrome.webview.postMessage === 'function') {
                window.chrome.webview.postMessage(JSON.stringify({
                    channel: 'LoginChannel',
                    message
                }));
            }
            const bridge = document.createElement('iframe');
            bridge.style.display = 'none';
            bridge.src = `app://LoginChannel/${encodeURIComponent(message)}`;
            document.documentElement.appendChild(bridge);
            setTimeout(() => bridge.remove(), 0);
        };

        const handleLogin = () => {
            const username = (usernameInput.value || '').trim().toLowerCase();
            const password = (passwordInput.value || '').trim();
            loginError.classList.add('hidden');

            sendLoginRequest({ username, password });
        };

        loginButton.addEventListener('click', handleLogin);
        passwordInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>

</html>
