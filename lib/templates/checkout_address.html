<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Checkout Shipping Address</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .radio-custom:checked {
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3ccircle cx='8' cy='8' r='3'/%3e%3c/svg%3e");
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div
        class="max-w-[430px] mx-auto min-h-screen flex flex-col bg-white dark:bg-slate-900 shadow-xl overflow-x-hidden">
        <header
            class="sticky top-0 z-10 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
            <div class="flex items-center px-4 py-4 justify-between">
                <button
                    class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
                </button>
                <h1 class="text-lg font-bold flex-1 text-center pr-10 text-slate-900 dark:text-slate-100">Shipping
                    Address</h1>
            </div>
            <div class="flex items-center justify-center gap-8 py-4 px-6">
                <div class="flex flex-col items-center gap-1.5">
                    <div
                        class="h-8 w-8 rounded-full bg-primary flex items-center justify-center text-white text-xs font-bold">
                        1</div>
                    <span class="text-[10px] font-semibold text-primary uppercase tracking-wider">Address</span>
                </div>
                <div class="h-px w-12 bg-slate-200 dark:bg-slate-700 -mt-5"></div>
                <div class="flex flex-col items-center gap-1.5 opacity-40">
                    <div
                        class="h-8 w-8 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-slate-600 dark:text-slate-400 text-xs font-bold">
                        2</div>
                    <span
                        class="text-[10px] font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Payment</span>
                </div>
                <div class="h-px w-12 bg-slate-200 dark:bg-slate-700 -mt-5"></div>
                <div class="flex flex-col items-center gap-1.5 opacity-40">
                    <div
                        class="h-8 w-8 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-slate-600 dark:text-slate-400 text-xs font-bold">
                        3</div>
                    <span
                        class="text-[10px] font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Confirm</span>
                </div>
            </div>
        </header>
        <main class="flex-1 px-4 py-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold">Saved Addresses</h3>
                <span class="text-xs font-medium text-slate-500 dark:text-slate-400">3 Addresses found</span>
            </div>
            <div class="space-y-4">
                <label
                    class="relative flex items-center gap-4 rounded-xl border-2 border-primary bg-primary/5 dark:bg-primary/10 p-4 transition-all cursor-pointer">
                    <input checked=""
                        class="radio-custom h-6 w-6 border-2 border-slate-300 dark:border-slate-600 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 checked:border-primary checked:bg-primary"
                        name="address_selection" type="radio" />
                    <div class="flex grow flex-col">
                        <div class="flex items-center justify-between">
                            <p class="text-slate-900 dark:text-slate-100 text-base font-bold">Home</p>
                            <span
                                class="bg-primary text-white text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-tight">Default</span>
                        </div>
                        <p class="text-slate-600 dark:text-slate-400 text-sm mt-1 leading-relaxed">123 Maple Street,
                            Springfield, IL 62704, United States</p>
                        <div class="flex gap-4 mt-3 pt-3 border-t border-primary/20">
                            <button
                                class="text-primary text-xs font-bold uppercase tracking-wide flex items-center gap-1">
                                <span class="material-symbols-outlined text-sm">edit</span> Edit
                            </button>
                            <button
                                class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-wide flex items-center gap-1">
                                <span class="material-symbols-outlined text-sm">delete</span> Delete
                            </button>
                        </div>
                    </div>
                </label>
                <label
                    class="flex items-center gap-4 rounded-xl border-2 border-slate-200 dark:border-slate-800 p-4 transition-all cursor-pointer hover:border-slate-300 dark:hover:border-slate-700 bg-white dark:bg-slate-800/50">
                    <input
                        class="radio-custom h-6 w-6 border-2 border-slate-300 dark:border-slate-600 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 checked:border-primary checked:bg-primary"
                        name="address_selection" type="radio" />
                    <div class="flex grow flex-col">
                        <p class="text-slate-900 dark:text-slate-100 text-base font-bold">Office</p>
                        <p class="text-slate-600 dark:text-slate-400 text-sm mt-1 leading-relaxed">456 Business Loop,
                            Suite 200, Chicago, IL 60601, United States</p>
                    </div>
                </label>
                <label
                    class="flex items-center gap-4 rounded-xl border-2 border-slate-200 dark:border-slate-800 p-4 transition-all cursor-pointer hover:border-slate-300 dark:hover:border-slate-700 bg-white dark:bg-slate-800/50">
                    <input
                        class="radio-custom h-6 w-6 border-2 border-slate-300 dark:border-slate-600 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 checked:border-primary checked:bg-primary"
                        name="address_selection" type="radio" />
                    <div class="flex grow flex-col">
                        <p class="text-slate-900 dark:text-slate-100 text-base font-bold">Beach House</p>
                        <p class="text-slate-600 dark:text-slate-400 text-sm mt-1 leading-relaxed">789 Ocean Drive,
                            Miami, FL 33139, United States</p>
                    </div>
                </label>
            </div>
            <button
                class="w-full mt-6 flex items-center justify-center gap-2 py-4 px-4 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-900 dark:text-slate-100 font-bold rounded-xl transition-colors border border-dashed border-slate-400 dark:border-slate-600">
                <span class="material-symbols-outlined">add_location_alt</span>
                <span>Add New Address</span>
            </button>
            <div class="mt-8 rounded-xl overflow-hidden relative h-40 group cursor-pointer">
                <img class="w-full h-full object-cover transition-transform group-hover:scale-105"
                    data-alt="Stylized map showing current delivery location" data-location="Chicago"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuBzHuQQhPYjiCUk0lmDwa-R85ZSNPQpE4ADJUkM3fhznXrDx58_SD5n0bZcF0QIqB64D-Tr7bX94XO9iaghBotj6QI2FgZ_Xhopjbr4i_55RIIev-P8vRWfCEZb5lauQkQ-vaikmCHzoCwa8XQRYmM63g_NvVONJ2MmuumXgeLcekSdWysz-vywaobt5O7f1ZnLUfHA-bIjKg7CtqXxQiyGCV1LSa0kWkgeoeBnOx2e2R6N6Mn2kUF7X-Yy9EPNoRi2cmKBochP8eo" />
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 to-transparent flex items-end p-4">
                    <div class="flex items-center gap-2">
                        <div class="p-1.5 bg-primary rounded-lg text-white">
                            <span class="material-symbols-outlined text-sm">map</span>
                        </div>
                        <span class="text-white text-sm font-semibold">View nearby collection points</span>
                    </div>
                </div>
            </div>
        </main>
        <footer class="p-6 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <p class="text-xs text-slate-500 dark:text-slate-400 font-medium">Deliver to Home</p>
                    <p class="text-slate-900 dark:text-slate-100 font-bold">123 Maple Street...</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-slate-500 dark:text-slate-400 font-medium">Estimated Delivery</p>
                    <p class="text-primary font-bold">Oct 24 - 26</p>
                </div>
            </div>
            <button
                class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/25 transition-all active:scale-95 flex items-center justify-center gap-2">
                Continue to Payment
                <span class="material-symbols-outlined">arrow_forward</span>
            </button>
        </footer>
    </div>
</body>

</html>
