<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Checkout Payment Method</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
        }

        .ios-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div class="mx-auto max-w-md min-h-screen bg-background-light dark:bg-background-dark flex flex-col relative">
        <!-- Header -->
        <header
            class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-4 py-3 flex items-center justify-between border-b border-slate-200 dark:border-slate-800">
            <button class="w-10 h-10 flex items-center justify-start text-slate-900 dark:text-slate-100">
                <span class="material-symbols-outlined">arrow_back_ios</span>
            </button>
            <h1 class="text-lg font-bold tracking-tight">Checkout</h1>
            <div class="w-10"></div>
        </header>
        <main class="flex-1 pb-32">
            <!-- Progress Stepper -->
            <div class="p-5">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm font-semibold text-primary">Payment Method</span>
                    <span class="text-xs font-medium text-slate-500">Step 3 of 4</span>
                </div>
                <div class="h-1.5 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
                    <div class="h-full bg-primary rounded-full" style="width: 75%;"></div>
                </div>
            </div>
            <!-- Section Title -->
            <div class="px-5 mb-4">
                <h2 class="text-xl font-bold">Select Payment</h2>
                <p class="text-sm text-slate-500">Choose your preferred payment method</p>
            </div>
            <!-- Payment Options -->
            <div class="px-5 space-y-3">
                <!-- Option 1: Card -->
                <label
                    class="relative flex items-center p-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl cursor-pointer group hover:border-primary transition-colors">
                    <input checked="" class="peer hidden" name="payment" type="radio" />
                    <div class="flex items-center justify-center w-12 h-12 rounded-lg bg-primary/10 text-primary mr-4">
                        <span class="material-symbols-outlined text-2xl">credit_card</span>
                    </div>
                    <div class="flex-1">
                        <p class="font-semibold text-sm">Credit or Debit Card</p>
                        <p class="text-xs text-slate-500">Visa, Mastercard, AMEX</p>
                    </div>
                    <div
                        class="w-5 h-5 border-2 border-slate-300 dark:border-slate-700 rounded-full flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-all">
                        <div class="w-2 h-2 bg-white rounded-full"></div>
                    </div>
                </label>
                <!-- Option 2: Bank Transfer -->
                <label
                    class="relative flex items-center p-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl cursor-pointer group hover:border-primary transition-colors">
                    <input class="peer hidden" name="payment" type="radio" />
                    <div
                        class="flex items-center justify-center w-12 h-12 rounded-lg bg-emerald-500/10 text-emerald-600 mr-4">
                        <span class="material-symbols-outlined text-2xl">account_balance</span>
                    </div>
                    <div class="flex-1">
                        <p class="font-semibold text-sm">Bank Transfer</p>
                        <p class="text-xs text-slate-500">Secure direct transfer</p>
                    </div>
                    <div
                        class="w-5 h-5 border-2 border-slate-300 dark:border-slate-700 rounded-full flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-all">
                        <div class="w-2 h-2 bg-white rounded-full"></div>
                    </div>
                </label>
                <!-- Option 3: COD -->
                <label
                    class="relative flex items-center p-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl cursor-pointer group hover:border-primary transition-colors">
                    <input class="peer hidden" name="payment" type="radio" />
                    <div
                        class="flex items-center justify-center w-12 h-12 rounded-lg bg-orange-500/10 text-orange-600 mr-4">
                        <span class="material-symbols-outlined text-2xl">payments</span>
                    </div>
                    <div class="flex-1">
                        <p class="font-semibold text-sm">Cash on Delivery</p>
                        <p class="text-xs text-slate-500">Pay when you receive</p>
                    </div>
                    <div
                        class="w-5 h-5 border-2 border-slate-300 dark:border-slate-700 rounded-full flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-all">
                        <div class="w-2 h-2 bg-white rounded-full"></div>
                    </div>
                </label>
            </div>
            <!-- Promo Code Section -->
            <div class="px-5 mt-8">
                <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-3">Promo Code</h3>
                <div
                    class="flex gap-2 p-1.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-sm focus-within:border-primary transition-colors">
                    <div class="flex items-center pl-3 text-slate-400">
                        <span class="material-symbols-outlined text-xl">sell</span>
                    </div>
                    <input class="flex-1 bg-transparent border-none focus:ring-0 text-sm py-2"
                        placeholder="Enter coupon code" type="text" />
                    <button
                        class="px-6 py-2 bg-primary/10 text-primary font-bold text-xs rounded-lg hover:bg-primary hover:text-white transition-all uppercase">Apply</button>
                </div>
            </div>
            <!-- Saved Cards (Preview) -->
            <div class="px-5 mt-8">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400">Your Saved Cards</h3>
                    <button class="text-primary text-xs font-bold">+ Add New</button>
                </div>
                <div class="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
                    <div
                        class="min-w-[280px] p-5 rounded-2xl bg-gradient-to-br from-slate-800 to-slate-950 text-white relative overflow-hidden ios-shadow">
                        <div class="relative z-10">
                            <div class="flex justify-between items-start mb-8">
                                <span class="material-symbols-outlined text-3xl">contactless</span>
                                <div class="w-12 h-8 bg-white/20 rounded backdrop-blur-sm"></div>
                            </div>
                            <p class="text-lg tracking-[0.2em] font-mono mb-6">**** **** **** 4242</p>
                            <div class="flex justify-between items-end">
                                <div>
                                    <p class="text-[10px] text-slate-400 uppercase">Card Holder</p>
                                    <p class="text-sm font-medium">Alex Johnson</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] text-slate-400 uppercase">Expires</p>
                                    <p class="text-sm font-medium">09/26</p>
                                </div>
                            </div>
                        </div>
                        <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/5 rounded-full"></div>
                    </div>
                </div>
            </div>
        </main>
        <!-- Fixed Footer Summary & Action -->
        <footer
            class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 dark:bg-slate-950/95 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 p-5 z-50">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <p class="text-xs text-slate-500 uppercase font-semibold">Total Amount</p>
                    <p class="text-2xl font-black text-slate-900 dark:text-white leading-none mt-1">$1,248.50</p>
                </div>
                <div class="text-right">
                    <p
                        class="text-xs text-emerald-600 font-bold bg-emerald-100 dark:bg-emerald-900/30 px-2 py-0.5 rounded-full">
                        Saving $42.00</p>
                </div>
            </div>
            <button
                class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/25 transition-all active:scale-[0.98]">
                <span>Confirm &amp; Pay</span>
                <span class="material-symbols-outlined text-lg">arrow_forward</span>
            </button>
        </footer>
    </div>
</body>

</html>
